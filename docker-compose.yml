services:
  admin_web:
    image: node:20-alpine
    container_name: app_ledinhlongpc_com
    working_dir: /app
    ports:
      - "1266:1266"
    environment:
      - NODE_ENV=development
      - PORT=1268
      - HOSTNAME=0.0.0.0
      # Next dev đôi khi cần polling trên Windows/WSL
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      # Mount source code vào container
      - ./:/app
      # Giữ node_modules trong container để tránh lỗi permission trên Windows
      - admin_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --port 1268 --hostname 0.0.0.0"
    restart: unless-stopped

volumes:
  admin_node_modules:
